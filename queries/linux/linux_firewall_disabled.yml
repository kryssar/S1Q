title: Disabling Linux Firewall
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
description: Detects Linux firewall being disabled.
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 
operating_system: linux
query: (src.process.name contains ("service","chkconfig") AND src.process.cmdline contains ("off","stop") AND src.process.cmdline contains "tables") OR (tgt.process.name = "systemctl" AND tgt.process.cmdline contains ("stop","disable") AND tgt.process.cmdline contains "firewalld")
false_positives: 
