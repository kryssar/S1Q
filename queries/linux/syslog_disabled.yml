title: Disable Syslog
description: Detect disabling of Linux Syslog service.
author: keyboardcrunch
date: 10/10/2020
modified: 
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 
operating_system: linux
query: tgt.process.name contains ("service","chkconfig","systemctl") AND tgt.process.cmdline contains ("rsyslog stop","off rsyslog","stop rsyslog","disable rsyslog")
false_positives: system management / monitoring
