title: OS Credential Dumping
description: Detects NPPSpy service or credential theft through generic IndicatorName.
author: keyboardcrunch && kryssar
date: 2021-03-17
modified: 2025-04-24
mitre: 
   tactic: Credential Access
   technique: T1003
   subtechnique: null
operating_system: linux
query: (registry.keyPath contains "\Services\NPPSpy" OR indicator.name in ("Mimikatz", "CredsReadFromLsass", "DumpSAM", "PasswordSniffingViaNetworkProvider") AND endpoint.os ='linux')
false_positives: null
tags: null
references:
   - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003/T1003.md