title: Windows Remote Management Execution
description: Detect remote process executions through MMC, WMIC, and PsExec (by name or display name). 
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Lateral Movement
   technique: T1021
   subtechnique: 006
operating_system: windows
query: (tgt.process.cmdline contains:anycase 'GetTypeFromProgID(' AND tgt.process.cmdline contains:anycase 'MMC20.application' AND tgt.process.cmdline contains:anycase '.Document.ActiveView.ExecuteShellCommand(') OR (tgt.process.name = 'wmic.exe' AND tgt.process.cmdline contains:anycase '/node:' AND tgt.process.cmdline contains:anycase 'process call create') OR ((src.process.name contains:anycase 'psexec.exe' OR src.process.displayname 'Execute processes remotely') AND dst.ip.address != '')
false_positives: 
   - Legitimate usage of PSExec
tags: 

