title: Mshta
description: SentinelOne happens to be pretty good at detecting MSHTA attacks, and
  IndicatorName = "SuspiciousScript" specifically picks out these javascript based
  attacks very well. The below query will detect mshta.exe spawning processes as well
  as URLs for remote payloads to be loaded by mshta.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Defense Evasion
   technique: T1218
   subtechnique: 005
operating_system: windows
query: (src.process.name == "mshta.exe" AND event.type == "Open Remote Process Handle") OR(src.process.name == "mshta.exe" AND src.process.cmdline matches "https?:\\/\\/(www\\.)?[-a-zA-Z0-9@:%._\\+~#=]{1,256}\\.[a-zA-Z0-9()]{1,6}\\b([-a-zA-Z0-9()@:%_\\+.~#?&//=]*)")
false_positives: SolidWorks, running .hta files for some reason
tags: null

