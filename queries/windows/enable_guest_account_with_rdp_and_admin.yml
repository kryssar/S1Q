title: Enable Guest account with RDP and Admin
description: Detects enabling of Guest account, adding Guest account to groups, as
  well as changing of Deny/Allow of Terminal Server connections through Registry changes.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Initial Access, Persistence, Privilege Escalation, Defense Evasion
   technique: T1078
   subtechnique: 001
operating_system: windows
query: (src.process.cmdline contains "net localgroup" AND src.process.cmdline contains "guest /add") OR (src.process.cmdline contains "net user" AND src.process.cmdline contains "/active:yes") OR (registry.keyPath in contains ("Terminal Server\AllowTSConnections","Terminal Server\DenyTSConnections") AND event.type in ("Registry Value Create","Registry Value Modified"))
false_positives: null
tags: null

