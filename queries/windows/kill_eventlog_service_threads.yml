title: Kill Eventlog Service Threads
description: Invoke-Phant0m specific detection (currently), catches renamed and obfuscated 
  versions by querying for the TerminateThread call.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 002
operating_system: windows
query: src.process.cmdline contains "Invoke-Phant0m" OR cmdScript.content contains "$Kernel32::TerminateThread($getThread" OR cmdScript.content contains "Invoke-Phant0m"
false_positives: 
