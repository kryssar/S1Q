title: Rundll32 Possible Cobalt Strike 
description: Loose detection of lateral movement through SMB, commonly used with Cobalt Strike.
author: keyboardcrunch && kryssar
date: 2020-12-02
modified: 2025-05-07
mitre: 
   tactic: Defense Evasion
   technique: T1218
   subtechnique: 011
operating_system: windows
query: (src.process.namme in:anycase ("rundll32.exe") AND src.process.cmdline = "") OR (src.process.name in:anycase ("rundll32.exe") AND src.process.netConnOutCount > "0" AND !(src.process.parent.name in ("splwow64.exe", "msiexec.exe")) AND src.process.cmdline matches ".*((?!C:\\windows\\system32\\spool\\DRIVERS\\.*,MonitorPrintJobStatus))$/gmi")
false_positives:
   - Printer drivers
   - High number of outbound SMB connections
tags:
   - Cobalt Strike
references:
   - https://thedfirreport.com/2020/10/08/ryuks-return/
