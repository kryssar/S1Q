title: Web Shell Creation
description: Generic web shell detection with filtering of possibly trusted sources
  of noise.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Persistence
   technique: T1505
   subtechnique: 003
operating_system: windows
query: event.type = 'File Creation' AND tgt.file.path contains:anycase 'inetpub\\wwwroot' AND tgt.file.extension contains:anycase ('jsp','aspx','php') AND !(src.process.name in ('explorer.exe', 'msdeploy.exe'))
false_positives: null
tags: null

