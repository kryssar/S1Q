title: Windows Logon Scripts
description: Detects addition of logon scripts through command line or registry methods.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Privilege Escalation
   technique: T1037
   subtechnique: 001
operating_system: windows
query: src.process.cmdline contains:anycase 'UserInitMprLogonScript' OR registry.keyPath contains:anycase 'UserInitMprLogonScript' AND event.type = 'Registry Value Create'
false_positives: null
tags: null