title: Exchange Transport Agent Cmdlet Use
description: Detection of Powershell TransportAgent Cmdlets being used to setup an
  Exchange Transport Agent.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Persistence
   technique: T1505
   subtechnique: 002
operating_system: windows
query: src.process.cmdline contains:anycase ("Install-TransportAgent","Enable-TransportAgent","Get-TransportAgent") OR cmdScript.content contains:anycase ("Install-TransportAgent","Enable-TransportAgent","Get-TransportAgent")
false_positives: null
tags: null

