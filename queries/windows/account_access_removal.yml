title: Account Access Removal
description: Detects the deletion of a local user account or removal of Active Directory
  groups through powershell cmdlets.
author: keyboardcrunch && kryssar
date: 10/10/2020
modified: 04/15/2025
mitre:
   tactic: Impact
   technique: T1531
   subtechnique: 
operating_system: windows
query: filter 
  os = "windows" &&
  (
    osSrc.process.cmdline matches "net\\s+user(?:(?!\\s+/delete)(?:.|\\n))*\\s+/delete" ||
    tgt.process.cmdline contains "Remove-ADGroupMember" ||
    src.process.script contains "Remove-ADGroupMember"
  )
false_positives: 
tags: 
references:
