title: CSC Compile After Delivery
description: Detect specific compilation of executables as well as dynamic
  compilation through detection of csc.exe creating executable files (both dll and
  exe). 
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion
   technique: T1027
   subtechnique: 004
operating_system: windows
query: (tgt.process.name = "csc.exe" AND src.process.cmdline contains "/target:exe") OR (src.process.name = "csc.exe" AND tgt.file.isExecutable = "true" AND !(src.process.parent.name in ("svchost.exe")))
false_positives: 
   - Absolute/Computrace software.
tags: null

