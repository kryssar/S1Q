title: Non-Windows Control Panel Item
description: Detect cpl files outside standard Windows directories. First portion
  of query may need to be dropped if there is too much noise in your environment.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-24
mitre:
   tactic: Defense Evasion
   technique: T1218
   subtechnique: 002
operating_system: windows
query: tgt.file.extension = 'cpl' AND ((src.process.name = 'control.exe' AND src.process.cmdline contains '.cpl') OR (tgt.file.path not contains "C:\\Windows" AND tgt.file.path not contains "C:\\Program Files" AND tgt.file.path not contains "C:\\$WINDOWS.~BT"))
false_positives: 
   - Applications bringing their own cpl files
tags: 

