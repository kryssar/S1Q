title: Invoke-MalDoc
description: Detection of Invoke-MalDoc.ps1, complementary to T1027 Evasion
  Indicator built into SentinelOne Agent.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Initial Access
   technique: T1566
   subtechnique: 001
operating_system: windows
query: (registry.keyPath contains ("Word\Security\AccessVBOM","Excel\Security\AccessVBOM") AND event.type in ("Registry Value Create","Registry Value Modified")) OR (src.process.cmdline contains:anycase ("ActiveVBProject.VBComponents","Word.Application","Excel.Application") OR cmdScript.content contains:anycase ("ActiveVBProject.VBComponents","Word.Application","Excel.Application"))
false_positives: 
   - Macro security setting changes
   - Powershell automation of Office docs
tags: 

