title: Findstr Password Extraction
description: Detection of content exfiltration of passwords within files using findstr.exe
  or PowerShell's findstr.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Credential Access
   technique: T1552
   subtechnique: 001
operating_system: windows
query: tgt.process.cmdline contains "/si pass" OR tgt.process.cmdline contains "-pattern password" OR tgt.process.cmdline contains "-pattern pass" OR tgt.process.cmdline contains "-pattern passwd" OR tgt.process.cmdline contains "-pattern secret" OR tgt.process.cmdline contains "-pattern key" OR tgt.process.cmdline contains "-pattern token" OR tgt.process.cmdline contains "-pattern cred" OR tgt.process.cmdline contains "-pattern auth" OR cmdScript.content contains "/si pass" OR cmdScript.content contains "-pattern password" OR cmdScript.content contains "-pattern pass" OR cmdScript.content contains "-pattern passwd" OR cmdScript.content contains "-pattern secret" OR cmdScript.content contains "-pattern key" OR cmdScript.content contains "-pattern token" OR cmdScript.content contains "-pattern cred" OR cmdScript.content contains "-pattern auth"
false_positives: null
tags: null

