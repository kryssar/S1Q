title: Batchfile Execution from Temp
description: Query for bat files executed from temp directories where SrcProcParentName isn't an executable we want to filter.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-16
mitre:
   tactic: Execution
   technique: T1059
   subtechnique: 003
operating_system: windows
query: src.process.name == "cmd.exe" && tgt.file.path contains "\\Temp" && tgt.file.type == "bat" && !(src.process.parent.name in ("msiexec.exe"))
false_positives: null
tags: null

