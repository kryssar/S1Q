title: DLL Side-Loading of Notepad++ GUP.exe
description: Detection of GUP.exe updater from Notepad++ being used for side-loading a dll.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion, Persistence, Privilege Escalation
   technique: T1574
   subtechnique: 002
operating_system: windows
query: tgt.process.displayName = 'WinGup for Notepad++' AND !(src.process.name in ('notepad++.exe', 'explorer.exe', 'lsass.exe', 'csrss.exe', 'svchost.exe', 'WerFault.exe'))
false_positives: null
tags: null

