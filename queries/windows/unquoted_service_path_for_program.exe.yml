title: Unquoted Service Path for program.exe
description: Detects creation or modification of the file at C:\program.exe for exploiting
  unquoted services paths of Program Files folder.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Defense Evasion, Persistence, Privilege Escalation
   technique: T1574
   subtechnique: 009
operating_system: windows
query: (tgt.file.path = 'C:\\program.exe' AND event.type in ('File Creation', 'File Modification')) OR tgt.process.image.path = 'C:\\program.exe'
