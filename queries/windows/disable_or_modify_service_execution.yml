title: Disable or Modify Service Execution
description: Detect the modification of service start type for defense evasion. Tuning will be required as many installers and updaters change service states.
author: keyboardcrunch && kryssar
date: 2020-12-18
modified: 2025-04-17
mitre: 
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 001
operating_system: windows
query: (registry.keyPath matches "\bMACHINE\\SYSTEM\\.*ControlSet.*\\Services\\.*\\Start" AND event.type = "Registry Value Modified") AND !(src.process.parent.name in ("services.exe","svchost.exe","smss.exe","WmiPrvSE.exe","wininit.exe","TiWorker.exe","msiexec.exe","OfficeClickToRun.exe")) AND !(src.process.name in ("GoogleUpdate.exe"))
false_positives:
   - Updater services such as those for Chrome/Edge
   - MSI installations
   - Explicitly adjusted service states
tags:
references:
