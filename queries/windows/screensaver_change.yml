title: Screensaver Change
description: Detects malicious changes to screensaver through Registry changes, filtering
  expected processes.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Persistence, Privilege Escalation
   technique: T1546
   subtechnique: 002
operating_system: windows
query: registry.keyPath contains 'Control Panel\\Desktop\\SCRNSAVE.EXE' AND (event.type in ('Registry Value Create', 'Registry Value Modified') AND !(src.process.name in ('svchost.exe','SetupHost.exe','CcmExec.exe')))
false_positives: null
tags: null

