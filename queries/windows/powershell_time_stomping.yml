title: PowerShell TimeStomping
description: Detection of time stomping with PowerShell.
author: keyboardcrunch && kryssar
date: 2020-11-24
modified: 2025-05-07
mitre: 
   tactic: Defense Evasion
   technique: T1070
   subtechnique: 006
operating_system: windows
query: cmdScript.content contains:anycase ('[IO.File]::SetCreationTime', 'IO.File]::SetLastAccessTime', '[IO.File]::SetLastWriteTime')
