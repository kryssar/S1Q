title: Service Created
description: Detects creation and modification of windows services through binPath
  argument to sc.exe.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Privilege Escalation
   technique: T1543
   subtechnique: 003
operating_system: windows
query: tgt.process.name = 'sc.exe' AND tgt.process.cmdline contains:anycase 'binPath=' AND !(tgt.process.cmdline contains:anycase 'Cloudflare')
false_positives: 
