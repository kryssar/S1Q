title: Local Account Added Windows
description: Detect all instances of local accounts being created.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Persistence
   technique: T1136
   subtechnique: 001
operating_system: windows
query: src.process.cmdline contains:anycase ("net user /add","New-LocalUser") OR src.process.cmdline matches "\bdscl\b.*\b/\create\b" OR src.process.cmdline matches "\bnet localgroup administrators\b.*\b\/add\b"
false_positives: 
   - General account maintenance.
tags: 

