title: Image File Execution Options Injection
description: Detection of Image File Execution Options tampering for persistence through
  Registry monitoring.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1546
   subtechnique: 012
operating_system: windows
query: registry.keyPath contains:anycase ("CurrentVersion\Image File Execution Options","CurrentVersion\SilentProcessExit") AND registry.keyPath contains:anycase ("GlobalFlag","ReportingMode","MonitorProcess")
false_positives: null
tags: null

