title: Modified SysInternals AccessChk
description: Detection of renamed AccessChk.exe, can be used for retrieval of the Chrome password db
  as well as other privileged files.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Credential Access
   technique: T1555
   subtechnique: 003
operating_system: windows
query: tgt.process.name = "accesschk.exe" AND tgt.process.displayName != "Reports effective  permissions for securable objects"
false_positives: 
