title: Malicious Process Start Added to Powershell Profile
description: Detects the addition of process execution strings (TgtProcCmdLine In
  Contains Anycase (list))to the powershell profile, through CommandLine and CommandScript
  indicators.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1546
   subtechnique: 013
operating_system: windows
query: (cmdScript contains "Add-Content $profile -Value" AND cmdScript contains "Start-Process") OR (tgt.process.cmdline contains "Add-Content $profile" AND tgt.process.cmdline contains:anycase ("Start-Process","& ","cmd.exe /c"))
false_positives: null
tags: null

