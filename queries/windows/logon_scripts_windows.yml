title: Logon Scripts Windows
description: Detects addition of logon scripts through command line or registry methods.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Persistence
   technique: T1037
   subtechnique: 001
operating_system: windows
query: src.process.cmdline contains "UserInitMprLogonScript" OR (registry.keyPath contains "UserInitMprLogonScript" AND event.type = "Registry Value Create")
false_positives: null
