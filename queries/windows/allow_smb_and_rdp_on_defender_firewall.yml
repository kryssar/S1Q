title: Allow SMB and RDP on Defender Firewall
description: Detects addition of Defender firewall rules for SMB and RDP.
author: keyboardcrunch
date: 10/10/2020
modified: 
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 002
operating_system: windows
query: filter
  (
    tgt.process.name == "netsh.exe" &&
    tgt.process.cmdline contains "remote desktop" &&
    tgt.process.cmdline contains "enable=Yes"
  ) ||
  (
    tgt.process.name == "netsh.exe" &&
    tgt.process.cmdline contains "file and printer sharing" &&
    tgt.process.cmdline contains "enable=Yes"
  )
false_positives: 
tags: 
references:
