title: Deobfuscate or Decode Files
description: Detect certutil encoding and decoding of executables,
  or use of renamed certutil.exe for bypassing detections.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion
   technique: T1140
   subtechnique: 
operating_system: windows
query: (tgt.process.name != "certutil.exe" AND tgt.process.displayName = "CertUtil.exe") OR ( tgt.process.displayName = "CertUtil.exe" AND (tgt.process.cmdline matches "^.*(-decode).*\.(exe)" OR tgt.process.cmdline matches "^.*(-encode).*\.(exe)") )
false_positives: 
tags: 

