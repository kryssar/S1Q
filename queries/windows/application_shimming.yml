title: Application Shimming
description: Detects application shimming through sdbinst or registry modification.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-15
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1546
   subtechnique: 008
operating_system: windows
query: (src.process.name == "sdbinst.exe" && src.process.cmdline contains ".sdb" ) || ( ( registry.keyPath contains "AppInit_DLLs" || registry.path contains "AppCompatFlags" ) && ( event.type == "Registry Value Create" || event.type == "Registry Value Modified"))
false_positives: null
tags: null
