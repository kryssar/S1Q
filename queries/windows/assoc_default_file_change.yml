title: File Association Modification via assoc
description: 	Detects use of the assoc command to change file associations, which can be abused for persistence or execution redirection.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-15
mitre:
   tactic: Privilege Escalation
   technique: T1546
   subtechnique: 008
operating_system: windows
query: filter
  tgt.process.name == "cmd.exe" && tgt.process.cmdline matches "\\bassoc\\b\\s+\\S+=\\S+"
false_positives: null
tags: null

