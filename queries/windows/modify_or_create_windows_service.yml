title: Windows Service Creation Modification
description: Detects creation and modification of windows services through binPath
  argument to sc.exe.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Persistence
   technique: T1543
   subtechnique: 003
operating_system: windows
query: tgt.process.name = "sc.exe" AND tgt.process.cmdline contains "binPath=" AND !(src.process.name in ("msiexec.exe", "trustedinstaller.exe", "dism.exe", "setup.exe", "connector.exe")) AND !(tgt.process.cmdline contains:anycase ("C:\\Windows\\System32\\DriverStore", "C:\\Program Files\\Dell", "C:\\Windows\\Installer", "C:\\Program Files\\Cloudflare\\Cloudflare WARP")) AND !(tgt.process.signer in ("Microsoft Corporation", "Dell Inc."))
false_positives: users that are allowed to install services 
tags: null

