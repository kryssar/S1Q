title: Registry Credential Enumeration
description: Detect enumeration and discovery of credentials within the Registry, including Putty sessions.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Credential Access
   technique: T1552
   subtechnique: 002
operating_system: windows
query: tgt.process.cmdline contains "query HKLM /f password /t REG_SZ /s" OR tgt.process.cmdline contains "query HKCU /f password /t REG_SZ /s" OR tgt.process.cmdline contains "query HKCU\Software\SimonTatham\PuTTY\Sessions /t REG_SZ /s"
false_positives: null
tags: null

