title: Disable Microsoft Office Security Features
description: Detects disabling of Microsoft Office Security features.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 001
operating_system: windows
query: (registry.keyPath contains "Excel\Security" OR registry.keyPath contains "Excel\Security\ProtectedView") AND registry.keyPath in:anycase ("VBAWarnings","DisableInternetFilesInPV","DisableUnsafeLocationsInPV","DisableAttachementsInPV") AND event.type in ("Registry Value Create","Registry Value Modified")
false_positives: null
tags: null

