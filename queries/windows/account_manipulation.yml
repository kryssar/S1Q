title: Account Manipulation
description: Detect account manipulation with the PowerShell AD module, filtered by Parent Process, as some Logon Scripts and Configuration Items (SCOM, SCCM) may also cause noise.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-15
mitre:
   tactic: Persistence
   technique: T1098
   subtechnique: 
operating_system: windows
query: (osSrc.process.cmdline contains:anycase ("New-ADUser", "Rename-LocalUser", "Set-LocalUser") || src.process.script contains:anycase ("New-ADUser", "Rename-LocalUser", "Set-LocalUser") || osSrc.process.cmdline matches "\\bAdd-ADGroupMember\\b.*\\bDomain Admins\\b" || src.process.script matches "\\bAdd-ADGroupMember\\b.*\\bDomain Admins\\b" ) && !(osSrc.process.parent.name in ("WmiPrvSE.exe", "AppVClient.exe", "svchost.exe", "CompatTelRunner.exe"))
false_positives: 
   - logon scripts
   - Configuration Manager CI/BL Items
tags:
references:
