title: Open Local Port on Defender Firewall
description: Detect opening of local ports within Defender Firewall.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-24
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 004
operating_system: windows
query: tgt.process.name = "netsh.exe" AND tgt.process.cmdline contains "add rule" AND tgt.process.cmdline contains "dir=in" AND tgt.process.cmdline contains "localport=" AND src.process.cmdline not matches:anycase 'SWVisualize'
false_positives: 
   - Application installs requiring listening ports.
   - Solidworks Visualize (SWVisualize) is a known false positive.
tags: 

