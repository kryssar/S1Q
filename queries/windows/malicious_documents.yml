title: Malicious Documents
description: Detect high risk processes spawned from Office applications. Complementary to T1566.001 Spearphishing
  Attachment due to similar download and macro detections.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-22
mitre:
   tactic: Execution
   technique: T1204
   subtechnique: 002
operating_system: windows
query: (src.process.parent.name contains ("WINWORD.EXE", "EXCEL.EXE") AND src.process.name contains:anycase ("cmd.exe", "cscript.exe", "wscript.exe", "certutil.exe", "powershell.exe", "msbuild.exe", "csc.exe") AND src.process.parent.pid exists) OR indicator.name = "SuspiciousDocument"
false_positives: 
   - Legit docs with macros.
   - McAfee DLP hits on links opened from docs.
   - Office plugins opening sites within browsers.
tags: 