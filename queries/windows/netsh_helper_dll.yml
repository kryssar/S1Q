title: Netsh Helper DLL
description: Detection of "helper" dlls with network command shell, through command
  arguments or registry modification.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-24
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1546
   subtechnique: 007
operating_system: windows
query: (tgt.progrss.name = "netsh.exe" AND tgt.process.cmdline contains "add helper") OR (registry.keyPath contains "SOFTWARE\Microsoft\NetSh" AND event.type = "Registry Value
  Create")
false_positives: null
tags: null

