title: Scripted Lateral RDP
description: Query will catch use of cmdkey for authenticating RDP sessions (often used for automated lateral movement).
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Lateral Movement
   technique: T1021
   subtechnique: 001
operating_system: windows
query: tgt.process.name = 'cmdkey.exe' AND tgt.process.cmdline contains '/generic:TERMSRV' AND tgt.process.cmdline contains '/user:' AND tgt.process.cmdline contains '/pass:'
false_positives: null
tags: null

