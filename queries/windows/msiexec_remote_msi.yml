title: Msiexec Remote MSI
description: Detect execution of remote msi files by msiexec.exe. The second 
  half of the query aims to detect processes spawned by msi files instead of dll files
  in the CommandLine (as that is very noisy) and may return a bit of noise within
  for the CrossProcess Object as some auto-update processes may be collected by this query.
author: keyboardcrunch &&  kryssar
date: 2020-10-10
modified: 2025-04-24
mitre:
   tactic: Defense Evasion
   technique: T1218
   subtechnique: 007
operating_system: windows
query: (src.process.name = 'msiexec.exe' AND src.process.cmdline matches 'https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&//=]*)') OR (src.process.name matches "^.*\.(tmp)" AND event.type = "Open Remote Process Handle" AND src.process.parent.name = "msiexec.exe")
false_positives: 
   - Auto-update processes
   - Google Chrome installation
   - Ivanti VPN agent 
tags: 

