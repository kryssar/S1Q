title: Service Created
description: Detects creation and modification of windows services through binPath
  argument to sc.exe.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Privilege Escalation
   technique: T1543
   subtechnique: 003
operating_system: windows
query: tgt.process.name = 'sc.exe' AND tgt.process.cmdline contains 'binPath=' AND tgt.process.cmdline contains 'create' AND !(src.process.name in ('services.exe','SetupHost.exe','svchost.exe')) AND !(tgt.process.cmdline contains 'Cloudflare')
false_positives: 
   - Legitimate service creation, such as dell power manager or other software.
tags: null

