title: Clear Windows Event Logs
description: Detects the clearing of EventLogs through wevtutil (concise) as well
  as Clear-EventLog through CommandLine and CommandScript objects. 
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Defense Evasion
   technique: T1070
   subtechnique: 001
operating_system: windows
query: (tgt.process.name = "wevtutil.exe" AND tgt.process.cmdline contains "cl ") OR ((src.process.cmdline contains "Clear-EventLog" OR cmdScript.content contains "Clear-EventLog") AND !(src.process.parent.name in ("WmiPrvSE.exe","PFERemediation.exe","svchost.exe")))
false_positives: 
   - SCOM built-in scripts
tags: null

