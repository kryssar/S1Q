title: Group Policy Preference Cred Extraction
description: Detection of sysvol GP Policy xml file enumeration, with findstr
  or Get-GPPPassword (Alias or CmdScript internal match).
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-17
mitre:
   tactic: Credential Access
   technique: T1552
   subtechnique: 006
operating_system: windows
query: tgt.process.cmdline matches "^.*\/S cpassword.*\\sysvol\\.*.xml" OR tgt.process.cmdline contains "Get-GPPPassword" OR cmdScript.content contains "Get-ChildItem -Path \"\\$Server\SYSVOL\" -Recurse -ErrorAction SilentlyContinue -Include 'Groups.xml','Services.xml','Scheduledtasks.xml','DataSources.xml','Printers.xml','Drives.xml'"
false_positives: 
tags: 

