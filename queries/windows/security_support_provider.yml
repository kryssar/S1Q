title: Security Support Provider
description: Detect changes to Security Support Provider through Registry modification.
  Filters most standard system changes with SrcProcName Not In (list).
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1547
   subtechnique: 005
operating_system: windows
query: registry.keyPath contains '\\Control\\Lsa\\Security Package' AND !(src.process.name in ('services.exe','SetupHost.exe','svchost.exe')) AND !(src.process.cmdline  contains 'system32\\wsauth.dll')
false_positives: 
   - Some application installs
tags: 

