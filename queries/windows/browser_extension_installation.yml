title: Browser Extension Installation
description: Lazy quyer for detecting the staging of xpi or crx
  extension packages for installation within Chrome and Firefox based browsers.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-04-16
mitre:
   tactic: Persistence
   technique: T1176
   subtechnique: 
operating_system: windows
query: (tgt.file.path matches "\\bWebstore Downloads\\b.*\\.crx$" || tgt.file.path matches "\\bstaged\\b.*\\.xpi$") && event.type == "File Creation"
false_positives: Users with permission to install whichever plugin/extension they want to their browser may trigger this alert.
tags: 

