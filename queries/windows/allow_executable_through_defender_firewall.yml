title: Allow Executable Through Defender Firewall
author: keyboardcrunch && kryssar
description: Detect allowance of executables within Users or Temp folders through Defender Firewall.
date: 2020-10-10
modified: 2025-04-15
mitre:
   tactic: Defense Evasion
   technique: T1562
   subtechnique: 002
operating_system: windows
query: tgt.process.name == "netsh.exe" && tgt.process.cmdline contains "add rule" && tgt.process.cmdline contains "program=" && tgt.process.cmdline contains:anycase ("C:\\Users", "C:\\Windows\\Temp") && !(account.name contains 'DW')
false_positives: 
tags: 
references:

