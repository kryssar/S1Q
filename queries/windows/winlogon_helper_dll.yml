title: Winlogon Helper DLL
description: Detects Winlogon Helper Dll changes through Registry MetadataIndicator
  item, as it holds the full registry change info but will only return data of the
  Indicators object type.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-21
mitre:
   tactic: Privilege Escalation, Persistence
   technique: T1547
   subtechnique: 004
operating_system: windows
query: indicator.metadata contains:anycase ('Microsoft\\Windows NT\\CurrentVersion\\Winlogon', 'Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\Notify') AND indicator.metadata contains:anycase ('logon', 'Userinit', 'Shell') AND !(indicator.metadata contains:anycase 'WINDOWS\\system32\\userinit.exe')
false_positives: null
tags: null

