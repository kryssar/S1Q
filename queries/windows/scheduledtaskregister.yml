title: ScheduledTaskRegister
description: Leveraging the ScheduleTaskRegister Indicator object for detection of
  registered tasks, but filtering for better quality results.
author: keyboardcrunch && kryssar
date: 2020-10-10
modified: 2025-05-07
mitre:
   tactic: Persistence
   technique: T1053
   subtechnique: 005
operating_system: windows
query: indicator.name = 'ScheduleTaskRegister'  AND !(src.process.parent.name in ('Integrator.exe','OfficeClickToRun.exe','services.exe','OneDriveSetup.exe','Ccm32BitLauncher.exe','WmiPrvSE.exe','officesvcmgr.exe','msiexec.exe'))
false_positives: 
   - Legitimate task creation
   - NPCAP driver task
   - CCM auto-upgrade task
tags: null

